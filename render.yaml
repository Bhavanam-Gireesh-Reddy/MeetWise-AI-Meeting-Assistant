services:
  - type: web
    name: briefly-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URI
        fromService:
          type: redis
          name: briefly-redis
          property: connectionString
      - key: SARVAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: redis
    name: briefly-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
