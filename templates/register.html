<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — Sarvam AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c10;--surface:#0f1620;--border:#1e2d40;
  --accent:#00d4ff;--accent2:#7c3aed;--danger:#ef4444;--success:#22c55e;
  --text:#e2eaf4;--muted:#6b8299;
  --font-ui:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(0,212,255,.06) 0%,transparent 70%),
             radial-gradient(ellipse 50% 50% at 80% 80%,rgba(124,58,237,.07) 0%,transparent 70%);
  pointer-events:none;}

.card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:40px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 24px rgba(0,212,255,.25);}
.logo-text{font-size:18px;font-weight:700;}
.logo-text span{color:var(--accent);}

h1{font-size:22px;font-weight:700;margin-bottom:6px;}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:28px;}

.field{margin-bottom:18px;}
label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--muted);
  letter-spacing:.5px;margin-bottom:7px;}
input{
  width:100%;padding:11px 14px;
  background:#0b1520;border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:var(--font-mono);font-size:14px;outline:none;
  transition:border-color .2s;
}
input:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}

.btn-primary{
  width:100%;padding:13px;margin-top:6px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;color:#fff;
  font-family:var(--font-ui);font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity .2s;letter-spacing:.3px;
}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}

.error-box{
  display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:9px;padding:11px 14px;margin-bottom:18px;
  font-size:13px;color:#fca5a5;
}
.error-box.visible{display:block;}

.success-box{
  display:none;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);
  border-radius:9px;padding:11px 14px;margin-bottom:18px;
  font-size:13px;color:#86efac;
}
.success-box.visible{display:block;}

.footer-link{
  text-align:center;margin-top:22px;font-size:13px;color:var(--muted);
}
.footer-link a{color:var(--accent);text-decoration:none;font-weight:600;}
.footer-link a:hover{text-decoration:underline;}

.spinner{display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="/auth-helper.js"></script>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎙</div>
    <div class="logo-text">Sarvam <span>AI</span></div>
  </div>

  <h1>Create your account</h1>
  <p class="subtitle">Start transcribing and translating in seconds</p>

  <div class="error-box" id="errorBox"></div>
  <div class="success-box" id="successBox"></div>

  <div class="field">
    <label>NAME</label>
    <input type="text" id="name" placeholder="Your full name" autocomplete="name"/>
  </div>
  <div class="field">
    <label>EMAIL</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="Min 8 characters" autocomplete="new-password"/>
  </div>

  <button class="btn-primary" id="registerBtn" onclick="doRegister()">Create Account</button>

  <div class="footer-link">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>

<script>
const nameEl  = document.getElementById('name');
const emailEl = document.getElementById('email');
const passEl  = document.getElementById('password');
const btn     = document.getElementById('registerBtn');
const errBox  = document.getElementById('errorBox');
const succBox = document.getElementById('successBox');

// Allow Enter key
[nameEl, emailEl, passEl].forEach(el => el.addEventListener('keydown', e => {
  if (e.key === 'Enter') doRegister();
}));

async function doRegister() {
  const name     = nameEl.value.trim();
  const email    = emailEl.value.trim();
  const password = passEl.value;
  if (!name || !email || !password) { showError('Please fill in all fields'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters'); return; }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account...';
  errBox.classList.remove('visible');
  succBox.classList.remove('visible');

  try {
    const res  = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, password})
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Registration failed'); return; }
    // Save token to localStorage
    if (data.token) {
      localStorage.setItem('auth_token', data.token);
    }
    succBox.textContent = '✅ Account created! Redirecting...';
    succBox.classList.add('visible');
    setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
  } catch(e) {
    showError('Network error — is the server running?');
  } finally {
    btn.disabled  = false;
    btn.innerHTML = 'Create Account';
  }
}

function showError(msg) {
  errBox.textContent = msg;
  errBox.classList.add('visible');
  succBox.classList.remove('visible');
}
</script>
</body>
</html>
